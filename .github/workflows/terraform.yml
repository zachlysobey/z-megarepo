name: Terraform (reusable)

on:
  workflow_call:
    inputs:
      module_name:
        required: true
        type: string
      terraform_vars:
        required: false
        type: string
        default: ""
    secrets:
      terraform_secret_vars:
        required: false

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/${{ inputs.module_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=${{ inputs.module_name }}"
      - run: terraform fmt -check
      - run: terraform validate
      - name: Terraform plan
        id: plan
        run: terraform plan ${{ inputs.terraform_vars }} ${{ secrets.terraform_secret_vars }} -no-color -out=tfplan
        if: github.event_name == 'pull_request'
        continue-on-error: true
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const plan = execSync(
              'terraform show -no-color tfplan',
              { cwd: 'infra/${{ inputs.module_name }}', maxBuffer: 1024 * 1024 }
            ).toString();

            const MAX_LEN = 60000;
            const planText = plan.length > MAX_LEN
              ? plan.substring(0, MAX_LEN) + '\n... (truncated, see Actions log for full output)'
              : plan;

            const marker = '<!-- tf-plan:${{ inputs.module_name }} -->';
            const body = [
              marker,
              '#### Terraform Plan — \`${{ inputs.module_name }}\`',
              '',
              '```',
              planText,
              '```',
              '',
              `*Triggered by @${{ github.actor }} in ${{ github.event.pull_request.html_url }}*`
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes(marker)
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
      - run: terraform apply ${{ inputs.terraform_vars }} ${{ secrets.terraform_secret_vars }} -auto-approve
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
