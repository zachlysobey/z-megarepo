name: "Tests: GitHub scripts"

on:
  push:
    branches: [master]
    paths: [.github/scripts/**]
  pull_request:
    paths: [.github/scripts/**]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Run tests
        run: node --test .github/scripts/**/*.unit.test.ts
