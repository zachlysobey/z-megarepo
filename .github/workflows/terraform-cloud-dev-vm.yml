name: "Terraform: cloud-dev-vm"

on:
  push:
    branches: [master]
    paths: [infra/cloud-dev-vm/**, .github/workflows/terraform-cloud-dev-vm.yml]
  pull_request:
    paths: [infra/cloud-dev-vm/**, .github/workflows/terraform-cloud-dev-vm.yml]

concurrency:
  group: terraform-cloud-dev-vm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cloud-dev-vm
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=cloud-dev-vm"
      - run: terraform fmt -check
      - run: terraform validate
      - name: Terraform plan
        id: plan
        run: terraform plan -var="project_id=${{ vars.GCP_PROJECT_ID }}" -no-color -out=tfplan
        if: github.event_name == 'pull_request'
        continue-on-error: true
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const path = require('path');

            const { GITHUB_WORKSPACE } = process.env;

            const scriptPath = path.join(
              GITHUB_WORKSPACE,
              '.github/scripts/terraform-plan-comment/index.ts',
            );

            const { terraformPlanComment } = await import(scriptPath);

            await terraformPlanComment(
              { github, context },
              {
                moduleName: 'cloud-dev-vm',
                workingDirectory: 'infra/cloud-dev-vm',
                actor: '${{ github.actor }}',
                prUrl: '${{ github.event.pull_request.html_url }}',
              },
            );
      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
      - run: terraform apply -var="project_id=${{ vars.GCP_PROJECT_ID }}" -auto-approve
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
