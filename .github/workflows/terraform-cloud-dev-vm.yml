name: "Terraform: cloud-dev-vm"

on:
  push:
    branches: [master]
    paths: [infra/cloud-dev-vm/**, .github/workflows/terraform-cloud-dev-vm.yml]
  pull_request:
    paths: [infra/cloud-dev-vm/**, .github/workflows/terraform-cloud-dev-vm.yml]

concurrency:
  group: terraform-cloud-dev-vm-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cloud-dev-vm
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend-config="bucket=${{ vars.GCP_TF_STATE_BUCKET }}" -backend-config="prefix=cloud-dev-vm"
      - run: terraform fmt -check
      - run: terraform validate
      - name: Terraform plan
        id: plan
        run: terraform plan -var="project_id=${{ vars.GCP_PROJECT_ID }}" -no-color
        if: github.event_name == 'pull_request'
      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const body = `#### Terraform Plan
            \`\`\`
            ${plan}
            \`\`\`
            *Triggered by @${{ github.actor }} in commit ${{ github.sha }}*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('#### Terraform Plan')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - run: terraform apply -var="project_id=${{ vars.GCP_PROJECT_ID }}" -auto-approve
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
